- name: creation of ec2 and r53
  hosts: localhost
  connection: local
  vars:
    ami_id: ami-0220d79f3f480ecf5
    sg_id: sg-08570272f74f280e0
    zone_id: "Z0703152351ZHIBULK5Q0"
    domain_name: "thiscomeback.fun"
    instance:
      - mongodb

  tasks:
    - name: create ec2 instance
      amazon.aws.ec2_instance:
        name: "{{ item }}"
        instance_type: t3.micro
        security_group: "{{ sg_id }}"
        image_id: "{{ ami_id }}"
        tags:
          Name: "{{ item }}"
      loop: "{{ instance }}"
      register: ec2_output

    - name: print ec2 output
      ansible.builtin.debug:
        msg: "{{ ec2_output }}"
    
