- name : set up my sql sever
  hosts: mysql
  become: yes
  tasks: 
  - name: install my sql server
    ansible.builtin.package:
      name: mysql-server
      state: present

  - name: start and enable my sql
    anisble.builtin.server:
     name: mysqld
     state: started
     enable: yes

  - name: setup root password
    ansible.builtin.command: mysql_secure_installation --set-root-pass RoboShop@1